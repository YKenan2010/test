<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2D Plane Fighter</title>

<style>
@font-face {
    font-family: "GameFont";
    src: url("./visuals/pixel-font.ttf");
}

html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    font-family: "GameFont";
    touch-action: none;
}

canvas {
    display: block;
}

/* UI */
.ui {
    position: absolute;
    color: white;
    font-size: 18px;
    user-select: none;
}

#health { top: 10px; left: 15px; font-size: 25px ;}
#score { top: 10px; left: 50%; transform: translateX(-50%); font-size: 25px; }
#raid { top: 10px; right: 15px; font-size: 25px;}
#fps { bottom: 5px; right: 10px; font-size: 12px; opacity: .6; font-size: 25px; }

/* Controls */
#joystick {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.2);
}

#stick {
    position: absolute;
    width: 60px;
    height: 60px;
    left: 30px;
    top: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
}

#shootBtn {
    position: absolute;
    bottom: 40px;
    right: 40px;
    width: 90px;
    height: 90px;
    background: url('./visuals/shoot_button.png');
    background-size: cover;
    border: none;
}

/* Game Over */
#gameOver {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: white;
}

#gameOver button {
    margin-top: 10px;
    padding: 8px 25px;
    font-family: "GameFont";
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="health" class="ui"></div>
<div id="score" class="ui"></div>
<div id="raid" class="ui"></div>
<div id="fps" class="ui"></div>

<div id="joystick"><div id="stick"></div></div>
<button id="shootBtn"></button>

<div id="gameOver">
    <h1>GAME OVER</h1>
    <div id="finalScore"></div>
    <div id="highScore"></div>
    <button onclick="restartGame()">Restart</button>
    <button>Menu</button>
</div>

<script src="effects.js"></script>
<script src="game.js"></script>
<script src="menu.js"></script>

</body>
</html>
